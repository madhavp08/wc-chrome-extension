<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <nav id="tabs" class="tabs" hidden>
      <button type="button" class="tab is-active" data-tab="main">VARdict</button>
      <button type="button" class="tab" data-tab="games">Games</button>
    </nav>
    <main class="card">
      <section id="panel-main" class="panel">
        <label class="toggle-btn">
          <input type="checkbox" id="enabled" class="toggle-input" />
          <span class="toggle-label">VARdict</span>
        </label>
        <div id="dev-root"></div>
        <p id="dev-status" class="dev-status" hidden></p>
      </section>
      <section id="panel-games" class="panel" hidden>
        <div id="games-list" class="games-list"></div>
      </section>
    </main>
    <script src="config.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
