<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="card">
      <label class="toggle-btn">
        <input type="checkbox" id="enabled" class="toggle-input" />
        <span class="toggle-label">VARdict</span>
      </label>
      <p class="slogan">Vote on controversial calls in real time.</p>
      <p id="state" class="note"></p>
      <div class="preview-row" hidden>
        <button type="button" id="preview-vote" class="preview-btn">Vote</button>
        <button type="button" id="preview-goal" class="preview-btn">Goal</button>
        <button type="button" id="preview-results" class="preview-btn">Results</button>
      </div>
    </main>
    <script src="config.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
